name: Quality Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Python syntax
        run: python -m py_compile app.py yolo26_detector.py

      - name: Check JavaScript syntax
        run: |
          node --check static/js/home.js
          node --check static/js/nav.js
          node --check static/js/detect.js
          node --check static/js/about.js
          node --check static/js/developer.js
          node --check static/js/device-detect.js

      - name: Check PowerShell deployment script
        shell: pwsh
        run: |
          $scripts = @(
            "./scripts/deploy-huggingface-space.ps1",
            "./scripts/build-windows-launcher.ps1",
            "./scripts/package-windows-release.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "PowerShell syntax error: $script"
              $errors | Format-List
              exit 1
            }
          }

  windows-launcher:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Build Windows launcher
        shell: pwsh
        run: ./scripts/build-windows-launcher.ps1

      - name: Confirm launcher output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "./TomatoInsightLauncher.exe")) {
            throw "TomatoInsightLauncher.exe was not generated."
          }
